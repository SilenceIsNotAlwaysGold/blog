        code: "import json\nimport re,time\n\ndef main(raw: str) -> dict:\n    \"\"\
          \"\n    解析形如 ```json ... ``` 的字符串，返回 dict\n    \"\"\"\n    # 1. 去掉 ```json\
          \ ... ``` 包裹\n    cleaned = re.sub(r\"```json\\s*|\\s*```\", \"\", raw.strip(),\
          \ flags=re.DOTALL)\n    time.sleep(3)\n    # 2. 加载 JSON -> dict\n    try:\n\
          \        parsed = json.loads(cleaned)\n        parsed = {k.strip(): v for\
          \ k, v in parsed.items()}  # 关键一步\n\n    except json.JSONDecodeError as\
          \ e:\n        raise ValueError(f\"JSON 解析失败: {e}\") from e\n\n    return\
          \ {\n        \"sql_line\":parsed.get(\"sql_line\"),\n    }\n\n\n"
