    - data:
        code: "import json\nfrom typing import Any, Dict, List, Union\nimport re\n\
          \ndef main(payload: Union[str, Dict[str, Any]], threshold: str) -> Dict[str,\
          \ Any]:\n    \"\"\"\n    提取最相似SQL，输出是否有满足要求的SQL和最相似SQL\n\n    参数:\n    \
          \    payload: dict | str\n            - dict 已解析好的响应数据\n            - str\
          \ JSON字符串\n        threshold: float\n            分数阈值，区分满足用户要求的结果\n\n  \
          \  返回:\n        {\n            \"has_similar_sql\": bool,\n            \"\
          most_similar_sql\": str\n        }\n    \"\"\"\n    threshold = float(threshold)\n\
          \    # 自动解析\n    if isinstance(payload, str):\n        data = json.loads(payload)\n\
          \    elif isinstance(payload, dict):\n        data = payload\n    else:\n\
          \        raise TypeError(\"payload 必须是 dict 或 JSON 字符串\")\n\n    items =\
          \ data.get(\"data\", [])\n    if not isinstance(items, list):\n        raise\
          \ ValueError(\"payload.data 必须是数组\")\n\n    # 按score降序排序\n    items.sort(key=lambda\
          \ x: x.get(\"score\", 0), reverse=True)\n\n    # 遍历，找到第一个满足阈值且成功提取SQL的\n\
          \    for item in items:\n        score = item.get(\"score\", 0.0)\n    \
          \    content = item.get(\"content\", \"\")\n        \n        if score >\
          \ threshold:\n            sql_list = extract_sql_from_content(content)\n\
          \            if sql_list:\n                return {\n                  \
          \  \"has_similar_sql\": \"True\",\n                    \"most_similar_sql\"\
          : sql_list[0]\n                }\n    \n    # 没找到\n    return {\n      \
          \  \"has_similar_sql\": \"False\",\n        \"most_similar_sql\": \"\"\n\
          \    }\n\ndef extract_sql_from_content(content: str) -> List[str]:\n   \
          \ \"\"\"从内容中提取SQL语句\"\"\"\n    sql_statements = []\n    \n    # 匹配 SQL:\
          \ 后的内容\n    sql_pattern = r'SQL:\\s*(.*?)(?=\\n{2,}|$)'\n    matches = re.findall(sql_pattern,\
          \ content, re.IGNORECASE | re.DOTALL)\n    \n    for match in matches:\n\
          \        statements = parse_sql_statements(match.strip())\n        sql_statements.extend(statements)\n\
          \    \n    return sql_statements\n\ndef parse_sql_statements(sql_batch:\
          \ str) -> List[str]:\n    \"\"\"解析批量SQL语句\"\"\"\n    sql_batch = re.sub(r'```sql\\\
          s*', '', sql_batch)\n    sql_batch = re.sub(r'```', '', sql_batch)\n   \
          \ sql_batch = re.sub(r'--.*?(?:\\n|$)', '\\n', sql_batch)\n    sql_batch\
          \ = re.sub(r'/\\*.*?\\*/', '', sql_batch, flags=re.DOTALL)\n    \n    statements\
          \ = []\n    current = \"\"\n    \n    for line in sql_batch.split('\\n'):\n\
          \        line = line.strip()\n        if not line:\n            continue\n\
          \        current += line + \" \"\n        if line.endswith(';'):\n     \
          \       statement = current.strip().rstrip(';').strip()\n            if\
          \ statement:\n                statements.append(statement)\n           \
          \ current = \"\"\n    \n    if current.strip():\n        statement = current.strip().rstrip(';').strip()\n\
          \        if statement:\n            statements.append(statement)\n    \n\
          \    return statements\n"
