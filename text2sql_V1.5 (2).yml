    - data:
        code: "import requests\nfrom typing import List, Dict, Any\n\n\n\ndef main(sql:\
          \ str, host: str) -> dict:\n    def format_sample_rows_to_markdown(sample_rows:\
          \ List[Dict[str, Any]]) -> str:\n        \"\"\"将数据格式化为Markdown表格\"\"\"\n\
          \        if not sample_rows:\n            return \"无数据返回。\"\n        headers\
          \ = sample_rows[0].keys()\n        lines = [\"| \" + \" | \".join(headers)\
          \ + \" |\"]\n        lines.append(\"| \" + \" | \".join([\"---\"] * len(headers))\
          \ + \" |\")\n        for row in sample_rows:\n            lines.append(\"\
          | \" + \" | \".join(str(row.get(h, '')) for h in headers) + \" |\")\n  \
          \      return \"\\n\".join(lines)\n\n    def extract_sql_results(response_json:\
          \ dict) -> List[Dict[str, Any]]:\n        \"\"\"\n        提取 SQL 执行接口中每条语句的结果行（合并）\n\
          \        兼容 status 为 'success' 或 'completed'\n        \"\"\"\n        if\
          \ response_json.get(\"status\") not in (\"success\", \"completed\"):\n \
          \           return []\n\n        results = response_json.get(\"results\"\
          , [])\n        if not isinstance(results, list):\n            return []\n\
          \n        all_rows = []\n        for item in results:\n            # item\
          \ 是 dict，且 status 为 success\n            if isinstance(item, dict) and item.get(\"\
          status\") == \"success\":\n                rows = item.get(\"results\",\
          \ [])\n                if isinstance(rows, list):\n                    all_rows.extend(rows)\n\
          \n        return all_rows\n\n    url = f\"{host}/run-sql\"\n    payload\
          \ = { \"sql_batch\": sql }\n    headers = { \"Content-Type\": \"application/json\"\
          \ }\n\n    try:\n        response = requests.post(url, json=payload, headers=headers,\
          \ timeout=100)\n        response.raise_for_status()\n        data = response.json()\n\
          \n        # 提取 SQL 数据行\n        extracted_rows = extract_sql_results(data)\n\
          \        markdown_sample = format_sample_rows_to_markdown(extracted_rows)\n\
          \n        return {\n            \"full_result\": data,\n            \"str_full_result\"\
          : str(extracted_rows),\n            \"markdown_sample\": markdown_sample,\n\
          \            \"raw_results\": extracted_rows\n        }\n\n    except requests.exceptions.RequestException\
          \ as e:\n        error_msg = {\n            \"status\": \"error\",\n   \
          \         \"message\": str(e),\n            \"response\": e.response.text\
          \ if e.response else None\n        }\n        return {\n            \"full_result\"\
          : error_msg,\n            \"str_full_result\": str(error_msg),\n       \
          \     \"markdown_sample\": \"接口调用失败。\",\n            \"raw_results\": []\n\
          \        }\n"
        code_language: python3
