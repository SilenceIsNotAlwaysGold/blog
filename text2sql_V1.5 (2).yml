    - data:
        code: "import re\nfrom typing import List, Dict, Any\n\ndef main(data: List[Dict[str,\
          \ Any]], target_document_names: List[str]) -> Dict[str, str]:\n    \"\"\"\
          \n    根据已去重的 document_name 列表，从 data 中筛选对应内容并格式化为 markdown。\n\n    :param\
          \ data: 原始数据列表（包含 content 和 metadata.document_name）\n    :param target_document_names:\
          \ 本轮已去重的新文档名列表，仅处理这些\n    :return: 包含 markdown 格式的结构化结果\n    \"\"\"\n\n\
          \    def extract_table_title(text: str) -> str:\n        match = re.search(r\"\
          表名[：:]?\\s*([^\\n]+)\", text)\n        return match.group(1).strip() if\
          \ match else \"未命名表\"\n\n    target_set = set(target_document_names)\n \
          \   sections = []\n    idx = 1\n\n    for item in data:\n        doc_name\
          \ = item.get(\"metadata\", {}).get(\"document_name\")\n        if not doc_name\
          \ or doc_name not in target_set:\n            continue\n\n        content\
          \ = item.get(\"content\", \"\").strip()\n        if not content:\n     \
          \       continue\n\n        title = extract_table_title(content)\n     \
          \   section = f\"### 查询结果{idx}：{title}\\n\\n```\\n{content}\\n```\"\n  \
          \      sections.append(section)\n        idx += 1\n\n    return {\n    \
          \    \"result\": \"\\n\\n\".join(sections) if sections else \"无可处理的新文档内容。\"\
          \n    }\n"
