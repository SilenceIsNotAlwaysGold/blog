    - data:
        code: "import json\nfrom typing import Any, Dict, List, Union, NamedTuple\n\
          import re\n\nclass SearchResult(NamedTuple):\n    \"\"\"搜索结果项，确保content和score的一一对应\"\
          \"\"\n    content: str\n    score: float\n\ndef main(payload: Union[str,\
          \ Dict[str, Any]], threshold: float = 0.0) -> Dict[str, Any]:\n    \"\"\"\
          \n    从 /api/v1/search 响应里提取 content 和 score 字段，确保一一对应\n    并分别返回满足和不满足阈值要求的结果，同时提取所有SQL语句\n\
          \n    参数\n    ----\n    payload : dict | str\n        - dict           \
          \ 已解析好的 Python 对象\n        - JSON 字符串     函数内部会自动 json.loads\n    threshold\
          \ : float\n        分数阈值，用于区分满足和不满足要求的结果\n\n    返回\n    ----\n    Dict[str,\
          \ Any]    包含满足和不满足要求的两部分结果，以及格式化的SQL语句\n    \"\"\"\n    # 1) 自动解析成 dict\n\
          \    if isinstance(payload, str):\n        data = json.loads(payload)\n\
          \    elif isinstance(payload, dict):\n        data = payload\n    else:\n\
          \        raise TypeError(\"payload 必须是 dict 或 JSON 字符串\")\n\n    # 2) 取\
          \ data 数组并按 score 降序\n    items = data.get(\"data\", [])\n    items.sort(key=lambda\
          \ x: x.get(\"score\", 0), reverse=True)\n\n    # 3) 使用 NamedTuple 确保一一对应，并分别收集满足和不满足要求的结果\n\
          \    qualified_results = []      # 满足要求的结果 (score > threshold)\n    unqualified_results\
          \ = []    # 不满足要求的结果 (score <= threshold)\n    qualified_contents = [] \
          \    # 满足要求的内容（字符串列表）\n    unqualified_contents = []   # 不满足要求的内容（字符串列表）\n\
          \    qualified_sql_statements = []  # 满足要求的SQL语句\n    all_sql_statements\
          \ = []     # 所有提取的SQL语句\n    \n    for item in items:\n        content =\
          \ item.get(\"content\", \"\")\n        score = item.get(\"score\", 0.0)\n\
          \        result = SearchResult(content=content, score=score)\n        \n\
          \        # 提取SQL语句\n        sql_statements = extract_sql_from_content(content)\n\
          \        all_sql_statements.extend(sql_statements)\n        \n        if\
          \ score > float(threshold):\n            qualified_results.append(result)\n\
          \            qualified_contents.append(content)\n            # 只收集满足要求的SQL语句\n\
          \            qualified_sql_statements.extend(sql_statements)\n        else:\n\
          \            unqualified_results.append(result)\n            unqualified_contents.append(content)\n\
          \n    # 去重SQL语句（保持顺序）\n    unique_all_sql = list(dict.fromkeys(all_sql_statements))\n\
          \    unique_qualified_sql = list(dict.fromkeys(qualified_sql_statements))\n\
          \    \n    # 将满足要求的SQL语句格式化为指定格式\n    qualified_sql_formatted = convert_extracted_sql_to_field_queries(unique_qualified_sql)\n\
          \n    return {\n\n        \"sql_statements\": unique_all_sql,      # 所有提取的SQL语句（去重）\n\
          \        \"qualified_sql\": unique_qualified_sql, # 满足要求的SQL语句（去重）\n   \
          \     \"qualified_sql_formatted\": qualified_sql_formatted[\"sql_line\"\
          ]  # 满足要求的SQL语句（格式化）\n    }\n\ndef generate_field_queries(field_values:\
          \ Dict[str, List[str]]) -> Dict[str, str]:\n    \"\"\"\n    根据字段值字典生成SQL查询语句\n\
          \    \n    参数:\n        field_values: 字段值字典，格式为 {\"table.field\": [\"value1\"\
          , \"value2\"]}\n    \n    返回:\n        Dict[str, str]: 包含格式化SQL语句的字典\n \
          \   \"\"\"\n    sql_statements = []\n    \n    for field_path, values in\
          \ field_values.items():\n        # 解析表名和字段名\n        if '.' in field_path:\n\
          \            table_name, field_name = field_path.split('.', 1)\n       \
          \ else:\n            # 如果没有表名，使用默认表名\n            table_name = \"default_table\"\
          \n            field_name = field_path\n        \n        # 为每个值生成一条SQL语句\n\
          \        for value in values:\n            sql = f\"SELECT DISTINCT {field_name}\
          \ FROM {table_name} WHERE LOWER({field_name}) LIKE '%{value.lower()}%' LIMIT\
          \ 10;\"\n            sql_statements.append(sql)\n    \n    # 用两个换行符连接所有SQL语句\n\
          \    sql_line = \"\\n\\n\".join(sql_statements)\n    \n    return {\"sql_line\"\
          : sql_line}\n\ndef convert_extracted_sql_to_field_queries(sql_statements:\
          \ List[str]) -> Dict[str, str]:\n    \"\"\"\n    将提取的SQL语句转换为字段查询格式\n  \
          \  \n    参数:\n        sql_statements: 提取的SQL语句列表\n    \n    返回:\n      \
          \  Dict[str, str]: 包含格式化SQL语句的字典\n    \"\"\"\n    formatted_statements =\
          \ []\n    \n    for sql in sql_statements:\n        # 简单格式化：确保每条SQL都有分号结尾\n\
          \        formatted_sql = sql.strip()\n        if not formatted_sql.endswith(';'):\n\
          \            formatted_sql += ';'\n        formatted_statements.append(formatted_sql)\n\
          \    \n    # 用两个换行符连接所有SQL语句\n    sql_line = \"\\n\\n\".join(formatted_statements)\n\
          \    \n    return {\"sql_line\": sql_line}\n\ndef parse_sql_statements(sql_batch:\
          \ str) -> List[str]:\n    \"\"\"解析批量SQL语句字符串，分割成单个SQL语句\"\"\"\n    # 移除Markdown代码块标记\n\
          \    sql_batch = re.sub(r'```sql\\s*', '', sql_batch)\n    sql_batch = re.sub(r'```\\\
          s*', '', sql_batch)\n    sql_batch = re.sub(r'`{3,}', '', sql_batch)\n \
          \   \n    # 移除注释\n    sql_batch = re.sub(r'--.*?\\n', '\\n', sql_batch)\n\
          \    sql_batch = re.sub(r'/\\*.*?\\*/', '', sql_batch, flags=re.DOTALL)\n\
          \    \n    # 按分号分割SQL语句\n    statements = []\n    current_statement = \"\
          \"\n    \n    for line in sql_batch.split('\\n'):\n        line = line.strip()\n\
          \        if not line:\n            continue\n            \n        current_statement\
          \ += line + \" \"\n        \n        # 如果行以分号结尾，认为是一个完整的SQL语句\n        if\
          \ line.endswith(';'):\n            statement = current_statement.strip()\n\
          \            if statement and statement != ';':\n                # 移除末尾的分号\n\
          \                statement = statement.rstrip(';').strip()\n           \
          \     if statement:\n                    statements.append(statement)\n\
          \            current_statement = \"\"\n    \n    # 处理最后一个没有分号的语句\n    if\
          \ current_statement.strip():\n        statement = current_statement.strip().rstrip(';').strip()\n\
          \        if statement:\n            statements.append(statement)\n    \n\
          \    return statements\n\ndef extract_sql_from_content(content: str) ->\
          \ List[str]:\n    \"\"\"从内容中提取SQL语句\"\"\"\n    sql_statements = []\n   \
          \ \n    # 查找SQL:后面的内容\n    sql_pattern = r'SQL:\\s*(.*?)(?=\\n|$)'\n   \
          \ matches = re.findall(sql_pattern, content, re.IGNORECASE | re.DOTALL)\n\
          \    \n    for match in matches:\n        # 解析每个匹配到的SQL批次\n        statements\
          \ = parse_sql_statements(match.strip())\n        sql_statements.extend(statements)\n\
          \    \n    return sql_statements"
