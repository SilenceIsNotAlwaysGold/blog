          \ \"\").strip()\n        sql_answer = (entry.get(\"sql_answer\") or \"\"\
          ).strip()\n        llm_result = parse_llm_json(entry.get(\"llm_answer\"\
          ) or \"\")\n\n        formatted = (\n            f\"用户问题: {user_query}\\\
          n\"\n            f\"SQL执行结果: {sql_answer}\\n\"\n            f\"是否已回答: {llm_result.get('is_answered')}\\\
          n\"\n            f\"分析原因: {llm_result.get('reason')}\\n\"\n            f\"\
          {'-'*40}\"\n        )\n        output.append(formatted)\n\n    return {\"\
          result\": \"\\n\\n\".join(output)}\n\ndef parse_llm_json(raw_str):\n   \
          \ \"\"\"从 llm_answer 中提取 JSON 内容\"\"\"\n    try:\n        match = re.search(r'\\\
          {[\\s\\S]*\\}', raw_str)\n        if match:\n            return json.loads(match.group())\n\
          \    except Exception:\n        pass\n    return {\n        \"is_answered\"\
          : \"False\",\n        \"reason\": \"解析失败\",\n    }\n\n\n\n"
