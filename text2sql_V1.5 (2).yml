    - data:
        code: "import re\nimport json\nfrom typing import Dict, Any\n\ndef main(raw:\
          \ str) -> Dict[str, Any]:\n    \"\"\"\n    解析带有 ```json ... ``` 代码块的模型输出，把其中的\
          \ JSON 返回为字典。\n    :param raw: 整段字符串（含 ```json ... ```）\n    :return: dict，键包括\
          \ can_answer / reason / search_query / table_field_path / candidate_values\n\
          \    \"\"\"\n    # 1) 提取 ```json ... ``` 之间的内容\n    match = re.search(r\"\
          ```json\\s*([\\s\\S]*?)\\s*```\", raw)\n    if not match:\n        raise\
          \ ValueError(\"未找到 JSON 代码块\")\n\n    json_block = match.group(1).strip()\n\
          \n    # 2) 反序列化为 Python dict\n    data = json.loads(json_block)\n\n    #\
          \ 3) 可选：对字段做显式拆分（其实直接返回 data 就已分开）\n    return {\n        \"can_answer\"\
          :        data.get(\"can_answer\"),\n        \"reason\":            data.get(\"\
          reason\"),\n        \"search_query\":      data.get(\"search_query\"),\n\
          \        \"table_field_path\":  data.get(\"table_field_path\"),\n      \
          \  \"candidate_values\":  data.get(\"candidate_values\", {}),\n    }\n"
