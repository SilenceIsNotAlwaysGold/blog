          \ = None,\n    batch_size: Optional[int] = None,\n    page: Optional[int]\
          \ = None,\n    page_size: Optional[int] = None,\n    filters: Optional[List[Dict[str,\
          \ str]]] = None\n) -> Dict[str, Any]:\n    \"\"\"\n    复刻浏览器完整请求头，确保接口请求一致\n\
          \    \"\"\"\n    similarity_threshold = float(similarity_threshold)\n  \
          \  vector_similarity_weight = float(vector_similarity_weight)\n    url =\
          \ f\"{host.rstrip('/')}{API_PREFIX}/search\"\n\n    headers = {\n    \"\
          Accept\": \"application/json, text/plain, */*\",\n    \"X-API-Key\":token\
          \ ,\n    \"Content-Type\": \"application/json\",\n    \"Origin\": host.rstrip('/'),\n\
          \    \"Referer\": f\"{host.rstrip('/')}/search\",\n    \"User-Agent\": \"\
          Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like\
          \ Gecko) Chrome/137.0.0.0 Safari/537.36\",\n    \"Connection\": \"keep-alive\"\
          ,\n    \"Accept-Language\": \"zh-CN,zh;q=0.9\"\n}\n\n    body = {\n    \
          \    \"dataset_ids\": [dataset_id],\n        \"query\": query,\n       \
          \ \"filters\": filters if filters is not None else [],\n        \"batch_size\"\
          : batch_size if batch_size is not None else 0,\n        \"top_k\": top_k,\n\
          \        \"similarity_threshold\": similarity_threshold,\n        \"vector_similarity_weight\"\
          : vector_similarity_weight if vector_similarity_weight is not None else\
          \ 0.3,\n        \"rerank_id\": rerank_id,\n        \"page\": page if page\
          \ is not None else 1,\n        \"page_size\": page_size if page_size is\
          \ not None else 10\n    }\n\n    \n\n    try:\n        resp = requests.post(url,\
          \ headers=headers, json=body, timeout=60)\n        resp.raise_for_status()\n\
          \        result = resp.json()\n        return {\"data\": result, \"success\"\
          : \"true\"}\n\n    except Exception as e:\n        return {\n          \
          \  \"data\": {\"error\": str(e)},\n            \"success\": \"false\"\n\
          \        }\n\nresult = main(\n    host=\"https://rag.clouditera.com/\",\n\
          \    token=\"88967296fcff4b19bd4d3d89ccf31e6a\",\n    dataset_id=\"cbb1b218b3e94e16b161877ed9e819a4\"\
          ,\n    rerank_id=\"c2cdb233e77545d3b26b4a07bf23451f\",\n    query=\"本月的新增漏洞\"\
          ,\n    top_k=20,\n    similarity_threshold=0.2,\n    vector_similarity_weight=0.7\n\
          )\nprint(result)\n"
