          \ document_name 列表\n\n    :param data: 当前检索返回的 JSON 列表，每项包含 metadata 字段\n\
          \    :param history: 历史已处理的 document_name 列表\n    :return: 去重后仍需处理的新 document_name\
          \ 列表，和当前全部去重后的列表\n    \"\"\"\n    document_names = set()\n\n    for item\
          \ in data:\n        metadata = item.get(\"metadata\", {})\n        doc_name\
          \ = metadata.get(\"document_name\")\n        if doc_name:\n            document_names.add(doc_name)\n\
          \n    # 去重：排除历史中已经处理过的\n    historical_set = set(history)\n    new_documents\
          \ = [doc for doc in document_names if doc not in historical_set]\n\n   \
          \ return {\n        \"new_documents\": new_documents,\n        \"all_current_documents\"\
          : list(document_names)\n    }\n"
