    - data:
        code: "import requests\n\ndef main(sql: str, host: str) -> dict:\n    def\
          \ format_sample_rows_to_markdown(sample_rows):\n        if not sample_rows:\n\
          \            return \"无数据返回。\"\n        headers = sample_rows[0].keys()\n\
          \        lines = [\"| \" + \" | \".join(headers) + \" |\"]\n        lines.append(\"\
          | \" + \" | \".join([\"---\"] * len(headers)) + \" |\")\n        for row\
          \ in sample_rows:\n            lines.append(\"| \" + \" | \".join(str(row.get(h,\
          \ '')) for h in headers) + \" |\")\n        return \"\\n\".join(lines)\n\
          \n    url = f\"{host}/run-sql\"\n    payload = { \"sql_batch\": sql }\n\
          \    headers = { \"Content-Type\": \"application/json\" }\n\n    try:\n\
          \        response = requests.post(url, json=payload, headers=headers, timeout=100)\n\
          \        response.raise_for_status()\n        data = response.json()\n\n\
          \        if data.get(\"status\") == \"success\":\n            results =\
          \ data.get(\"results\", [])\n            top5 = results[:5] if isinstance(results,\
          \ list) else []\n            markdown_sample = format_sample_rows_to_markdown(top5)\n\
          \            str_summary = str(top5)\n        else:\n            top5 =\
          \ []\n            str_summary = str(data)\n\n        return {\n        \
          \    \"full_result\": data,\n            \"str_full\":str(data)\n      \
          \  }\n\n    except requests.exceptions.RequestException as e:\n        error_msg\
          \ = {\n            \"status\": \"error\",\n            \"message\": str(e),\n\
          \            \"response\": e.response.text if e.response else None\n   \
          \     }\n        return {\n            \"full_result\": error_msg,\n   \
          \         \"str_full\":\"\"\n\n        }\n"
