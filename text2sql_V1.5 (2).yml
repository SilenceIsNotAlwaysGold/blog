          \ list)\n    except Exception as e:\n        print(\"解析失败:\", e)\n     \
          \   return {\"vuln_ids\": []}\n    vuln_ids = []\n    for item in result_list:\n\
          \        # 依次尝试所有可能的字段\n        found = False\n        for k in id_keys:\n\
          \            cve_id = str(item.get(k, '')).strip()\n            if cve_id:\n\
          \                vuln_ids.append(cve_id)\n                found = True\n\
