    - data:
        code: "from typing import Any, Dict, List\n\ndef main(data: Dict[str, Any])\
          \ -> Dict[str, bool]:\n    \"\"\"\n    汇总批量 SQL 执行结果（仅看 status 字段）\n\n \
          \   规则\n    ----\n    1. 至少 1 条语句 status ∈ {'success', 'completed'} 且有数据\
          \       → is_success=True , is_empty=False\n    2. 其余语句出现 status='error'\
          \                                  → is_success=False, is_empty=False\n\
          \    3. 所有语句 status='empty'（即执行成功但均 0 行）                → is_success=False,\
          \ is_empty=True\n    4. 其它异常情况（results 为空、未知 status 等）                 \
          \ → is_success=False, is_empty=False\n    \"\"\"\n    # results 可能在 data\
          \ 或 data[\"data\"] 中\n    results: List[Dict[str, Any]] = (\n        data.get(\"\
          results\")\n        or data.get(\"data\", {}).get(\"results\")\n    )\n\
          \    if not isinstance(results, list) or not results:\n        return {\"\
          is_success\": \"False\", \"is_empty\": \"False\"}\n\n    has_success_data\
          \ = \"False\"   # 成功且有数据\n    has_error        = \"False\"   # 任意执行失败\n\
          \    only_empty       = \"True\"    # 初始假设全 empty，发现其他状态再改\n\n    for item\
          \ in results:\n        if not isinstance(item, dict):\n            continue\n\
          \        status = str(item.get(\"status\", \"\")).lower()\n        row_cnt\
          \ = int(item.get(\"row_count\") or 0)\n\n        if status in {\"success\"\
          , \"completed\"}:\n            only_empty = \"False\"\n            if row_cnt\
          \ > 0:\n                has_success_data = \"True\"\n        elif status\
          \ == \"empty\":\n            # 维持 only_empty=True，直到发现其他状态\n           \
          \ pass\n        elif status == \"error\":\n            has_error = \"True\"\
          \n            only_empty = \"False\"\n        else:\n            # 未知状态按错误处理\n\
          \            has_error = \"True\"\n            only_empty = \"False\"\n\n\
          \    if has_success_data:\n        return {\"is_success\": \"True\",  \"\
          is_empty\": \"False\"}\n    if has_error:\n        return {\"is_success\"\
          : \"False\", \"is_empty\": \"False\"}\n    if only_empty:\n        return\
          \ {\"is_success\": \"False\", \"is_empty\": \"True\"}\n\n    return {\"\
          is_success\": \"False\", \"is_empty\": \"False\"}\n"
