    - data:
        code: "from typing import Dict, List\nfrom collections import defaultdict\n\
          \ndef main(field_values: Dict[str, List]) -> Dict[str, str]:\n    \"\"\"\
          \n    支持多个表：根据 {表.字段: [值]} 格式的输入，自动按表分组并生成模糊唯一值查询 SQL。\n    - 每个字段的每个值单独生成一条\
          \ SELECT DISTINCT 语句\n    - 使用 LOWER(field) LIKE '%xxx%' 进行模糊匹配\n    - 查询每个表的前10行数据\n\
          \    - 结果通过 \\n\\n 拼接\n    \"\"\"\n    grouped_fields = defaultdict(list)\n\
          \n    for full_field, values in field_values.items():\n        if \".\"\
          \ not in full_field or not values:\n            continue\n        table,\
          \ field = full_field.split(\".\", 1)\n        grouped_fields[table].append((field,\
          \ values))\n\n    queries = []\n\n    for table, fields in grouped_fields.items():\n\
          \    \n\n        # 保留原来的字段值查询\n        for field, values in fields:\n  \
          \          for v in values:\n                val = str(v).lower()\n    \
          \            sql = (\n                    f\"SELECT DISTINCT {field} FROM\
          \ {table} \"\n                    f\"WHERE LOWER({field}) LIKE '%{val}%'\
          \ \"\n                    f\"LIMIT 10;\"\n                )\n          \
          \      queries.append(sql)\n\n    sql_line = \"\\n\\n\".join(queries)\n\
          \    return {\"sql_line\": sql_line}\n"
        code_language: python3
        desc: ''
