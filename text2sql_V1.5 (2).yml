    - data:
        code: "from itertools import zip_longest\nimport json\nfrom typing import\
          \ List, Dict, Any, Optional\n\n\ndef main(\n    user_question: str,\n  \
          \  knowledge_context: list,\n    state: str,\n    reason: str,\n    sql_fix:\
          \ str,\n    result: str,\n    sql_example: str = None,\n    sql_err_answer:\
          \ List[str] = None,\n    current_time: str = None,\n    example_values:\
          \ dict = None,\n    solution_count: int = 3\n) -> dict:\n    \"\"\"\n  \
          \  构造用于 LLM 的 Prompt，让其根据同一业务问题：\n    1. 生成多条 SQL 方案；\n    2. 对每条 SQL 进行语法校验；\n\
          \    3. 从中选择最满足用户意图、语法最可靠的一条输出。\n    \"\"\"\n\n    sql_err_answer = sql_err_answer\
          \ or []\n    knowledge_context = knowledge_context or []\n\n    prompt_lines:\
          \ List[str] = []\n\n    # 1. 角色定义\n    prompt_lines.append(\n        \"\
          你是一名资深数据库工程师，擅长将自然语言问题转化为结构清晰、性能优化、安全合规的 SQL 查询语句。\"\n    )\n\n    # 2.\
          \ 用户问题输入\n    prompt_lines.append(f\"\\n【现在时间】：\\n{current_time.strip()\
          \ if current_time else ''}\")\n    prompt_lines.append(f\"\\n【用户问题】\\n{user_question.strip()}\"\
          )\n    prompt_lines.append(\"------------------------------------------\"\
          )\n\n    # 3. 知识上下文提示\n    if knowledge_context:\n        prompt_lines.append(\"\
          \\n【结构化知识上下文】\")\n        for i, context in enumerate(knowledge_context):\n\
          \            prompt_lines.append(f\"检索结果{i + 1}：{context.strip()}\")\n \
          \   prompt_lines.append(\"------------------------------------------\")\n\
          \n    # 4. 数据结构/字段信息\n    if reason:\n        prompt_lines.append(\"\\n【解题方向（可能）】\"\
          )\n        prompt_lines.append(reason.strip())\n    prompt_lines.append(\"\
          ------------------------------------------\")\n\n\n        \n    prompt_lines.append(\"\
          【查询可能是用户意图所涉及的关键词的sql语句】\")\n    prompt_lines.append(f\"{sql_example}\"\
          )\n    prompt_lines.append(\"\\n【可能是用户意图所涉及的关键词】\")\n    prompt_lines.append(\"\
          ```json\")\n    prompt_lines.append(f\"{json.dumps(example_values or {},\
          \ ensure_ascii=False)}\")\n    prompt_lines.append(\"```\")\n\n    # 6.\
          \ SQL 修复模式\n    if state == \"fix_sql\":\n        prompt_lines.append(\"\
          \\n【历史错误信息】\")\n        if sql_err_answer:\n            prompt_lines.append(\"\
          \\n【历史尝试记录】\")\n            for ans in sql_err_answer:\n               \
          \ prompt_lines.append(ans)\n        prompt_lines.append(result)\n      \
          \  prompt_lines.append(\"\\n请根据上述错误，生成语义等价但可成功执行的 SQL 语句\")\n        if\
          \ sql_fix:\n            prompt_lines.append(\"对于sql执行结果为空的分析：\")\n     \
          \       prompt_lines.append(sql_fix.strip())\n        \n    elif state ==\
          \ \"fix_query\":\n\n        prompt_lines.append(\"\\n【历史解决问题的历史存储记录】：\"\
          )\n        prompt_lines.append(result)\n        prompt_lines.append(\"注意：你需要根据用历史中sql查询结果不能回答用户信息/sql报错的信息，对sql进行完善！请确保二次给出的sql完全满足用户需求，且能成功执行\"\
          )\n    else:\n        # 7. SQL 构建建议（用于非修复任务）\n        prompt_lines.append(\"\
          \\n【SQL构建建议】\")\n        prompt_lines.append(\"- 明确主表与关联表的来源关系\")\n    \
          \    prompt_lines.append(\"- 使用参数化查询避免 SQL 注入\")\n        prompt_lines.append(\"\
          - 中文模糊匹配字段建议使用 `utf8mb4` 编码 + COLLATE 指定\")\n        prompt_lines.append(\"\
          - 建议使用 `LIMIT` 控制返回数据量\")\n        prompt_lines.append(\"- 可视情况添加索引建议提升效率\"\
          )\n        prompt_lines.append(\"- **在 `SELECT` 中显式列出完全满足用户问题所需要的**全部关键字段**，避免只返回\
          \ 1-2 个字段或使用 `SELECT *`**\")\n        prompt_lines.append(\"- 若 WHERE 子句同时包含\
          \ OR 与 AND，必须使用括号显式分组，并确保每个 `(` 都有对应 `)`，以避免语法错误和逻辑歧义\")\n        prompt_lines.append(\"\
          - 在提交前进行基本语法自检，确保不会触发 \\\"You have an error in your SQL syntax\\\" 报错\"\
          )\n\n    # 8. 多方案 & 方案筛选要求\n    prompt_lines.append(\"\\n【额外要求】\")\n   \
          \ prompt_lines.append(\"- 每条 SQL 生成后请自检语法，确保无明显错误（如括号缺失、逻辑混乱、关键词拼写错误等）。\"\
          )\n    prompt_lines.append(\"- 在所有方案中，基于语法正确性、结果可靠性与业务需求契合度，选择最优的一条方案，作为最终推荐输出。\"\
          )\n    prompt_lines.append(\"- 注意：生成的 SQL 语句在 SELECT 字段时，应尽可能全面，覆盖所有与用户需求相关的信息，尤其要包含能唯一标识漏洞的字段（如\
          \ vul_id、cve_id）。这样能够帮助用户更清晰、全面地理解查询结果，提升信息利用价值。\")\n\n    # 9. 输出结构模板（多方案+最终推荐方案）\n\
          \    prompt_lines.append(\"\\n【期望输出格式】\")\n    prompt_lines.append(\"\"\"\
          ```json\n{\n\"solutions\": [\n    {\n    \"table_name\": \"xxx\",\n    \"\
          key_fields\": [\"字段1\", \"字段2\"],\n    \"sql_line\": \"SELECT 字段1, 字段2 FROM\
          \ 表名 WHERE 条件 LIMIT 20\",\n    \"reason\": \"该方案如何满足用户意图，语法可靠性说明\",\n  \
          \  \"index_suggestion\": \"可选：对模糊匹配字段添加联合索引\"\n    }\n\n\n```\"\"\")\n\n\
          \    return {\"prompt\": \"\\n\".join(prompt_lines)}\n"
        code_language: python3
