    - data:
        code: "from typing import List, Dict\n\ndef main(\n    ids: List[str],\n \
          \   fields: List[str] | None = None,\n    table_name: str = \"vul_info\"\
          ,\n) -> Dict[str, str]:\n    \"\"\"\n    根据漏洞 ID 列表自动拼接 SQL。\n    - 若 ID\
          \ 形如 'CVE-2020-****'，自动按 cve_id 查询；\n    - 若 ID 形如 'YQ-2020-****' / 'VUL-****'\
          \ 等，自动按 vul_id 查询。\n    \"\"\"\n    if not ids:                       #\
          \ 空列表直接返回占位 SQL\n        return {\"sql\": \"\"}\n\n    # ---- 1. 自动识别查询字段\
          \ ----\n    def detect_id_field(first_id: str) -> str:\n        first =\
          \ first_id.upper()\n        if first.startswith(\"CVE-\"):\n           \
          \ return \"cve_id\"\n        return \"vul_id\"               # 其余默认用 vul_id\n\
          \n    id_field = detect_id_field(ids[0])\n\n    # ---- 2. 字段列 ----\n   \
          \ default_fields = [\n        \"vul_id\",           # 方便一次性拿到两种 ID\n   \
          \     \"cve_id\",\n        \"severity\",\n        \"title_cn\",\n      \
          \  \"title_en\",\n        \"description_en\",\n        \"description_cn\"\
          ,\n    ]\n    field_str = \", \".join(fields or default_fields)\n\n    #\
          \ ---- 3. IN 列表 ----\n    id_list = \", \".join(f\"'{i}'\" for i in ids)\n\
          \n    # ---- 4. 拼接 SQL ----\n    sql = (\n        f\"SELECT {field_str}\\\
          n\"\n        f\"FROM {table_name}\\n\"\n        f\"WHERE {id_field} IN ({id_list});\"\
          \n    )\n    return {\"sql\": sql}\n"
        code_language: python3
        desc: ''
