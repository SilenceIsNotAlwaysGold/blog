    - data:
        code: "import ast\nfrom typing import List, Dict, Any\n\ndef main(raw_str:\
          \ str) -> Dict[str, List[str]]:\n    \"\"\"\n    从字符串解析漏洞id列表，自动支持'漏洞 id'、'cve_id'、'vul_id'字段\n\
          \    :param raw_str: 原始字符串（如SQL查询结果）\n    :return: {\"vuln_ids\": [...]}，若解析失败则返回空列表\n\
          \    \"\"\"\n    id_keys = ['漏洞 id', 'cve_id', 'vul_id']\n    try:\n   \
          \     result_list = ast.literal_eval(raw_str)\n        assert isinstance(result_list,\
          \ list)\n    except Exception as e:\n        print(\"解析失败:\", e)\n     \
          \   return {\"vuln_ids\": []}\n    vuln_ids = []\n    for item in result_list:\n\
          \        # 依次尝试所有可能的字段\n        found = False\n        for k in id_keys:\n\
          \            cve_id = str(item.get(k, '')).strip()\n            if cve_id:\n\
          \                vuln_ids.append(cve_id)\n                found = True\n\
          \                break\n        # 如果没有匹配到，也可以选择继续处理或提示\n        # if not\
          \ found:\n        #     print(\"未找到ID字段于:\", item)\n    return {\"vuln_ids\"\
          : vuln_ids}\n"
