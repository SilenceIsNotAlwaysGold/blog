    - data:
        code: "#!/usr/bin/env python3\n\"\"\"\nsimple_rag_uploader.py (Dify稳定增强版)\n\
          \n固定返回字段：\n    result  - success | error | empty\n    message - 说明信息\n \
          \   doc_id  - 文档 ID，失败/空返回\"\"\n    status  - 向量化接口返回的status，失败为error\n\
          \    data    - 向量化接口完整JSON，失败为None\n    debug   - 额外调试信息\n\"\"\"\n\nfrom\
          \ io import BytesIO\nfrom typing import Sequence, Dict, Any, Optional\n\
          import requests\nimport traceback\n\nAPI_PREFIX = \"/api/v1\"\n\n\ndef _make_resp(result:\
          \ str, message: str = \"\", doc_id: str = \"\",\n               status:\
          \ str = \"\", data: Optional[Dict[str, Any]] = None, debug: str = \"\")\
          \ -> Dict[str, Any]:\n    \"\"\"统一返回格式\"\"\"\n    return {\n        \"result\"\
          : result,\n        \"message\": message,\n        \"doc_id\": doc_id,\n\
          \        \"status\": status,\n        \"data\": data,\n        \"debug\"\
          : debug\n    }\n\n\ndef _upload(host: str, token: str, kb_id: str, content:\
          \ str, filename: str) -> str:\n    \"\"\"上传文档\"\"\"\n    url = f\"{host.rstrip('/')}{API_PREFIX}/documents/{kb_id}/upload\"\
          \n    headers = {\"X-API-Key\": token}\n    files = {\"file\": (filename,\
          \ BytesIO(content.encode()), \"text/plain\")}\n\n    try:\n        resp\
          \ = requests.post(url, headers=headers, files=files, timeout=120)\n    \
          \    resp.raise_for_status()\n        data = resp.json()\n\n        # 已存在的情况\n\
          \        if data.get(\"status\") == \"error\" and \"already exists\" in\
          \ data.get(\"message\", \"\").lower():\n            return \"\"  # 已存在返回空串，后续跳过向量化\n\
          \n        if data.get(\"status\") != \"success\" or not isinstance(data.get(\"\
          data\"), dict):\n            raise RuntimeError(f\"上传接口结构异常: {data}\")\n\
          \n        doc_id = data[\"data\"].get(\"doc_id\", \"\")\n        if not\
          \ doc_id:\n            raise RuntimeError(f\"无法获取doc_id, 完整返回: {data}\"\
          )\n\n        return doc_id\n\n    except Exception as e:\n        raise\
          \ RuntimeError({\n            \"url\": url,\n            \"exception_type\"\
          : str(type(e)),\n            \"exception_detail\": repr(e),\n          \
          \  \"traceback\": traceback.format_exc()\n        })\n\n\ndef _vectorize(host:\
          \ str, token: str, kb_id: str, doc_ids: Sequence[str]) -> Dict[str, Any]:\n\
          \    \"\"\"触发向量化\"\"\"\n    url = f\"{host.rstrip('/')}{API_PREFIX}/documents/{kb_id}/vectorize\"\
          \n    headers = {\"X-API-Key\": token, \"Content-Type\": \"application/json\"\
          }\n    payload = {\"doc_id\": doc_ids}\n\n    try:\n        resp = requests.post(url,\
          \ headers=headers, json=payload, timeout=60)\n        resp.raise_for_status()\n\
          \        return resp.json()\n\n    except Exception as e:\n        raise\
          \ RuntimeError({\n            \"url\": url,\n            \"exception_type\"\
          : str(type(e)),\n            \"exception_detail\": repr(e),\n          \
          \  \"traceback\": traceback.format_exc()\n        })\n\n\ndef main(*, host:\
          \ str, token: str, kb: str, default_text: str, filename: Optional[str] =\
          \ None) -> Dict[str, Any]:\n    \"\"\"上传并向量化主流程\"\"\"\n    if not all([host,\
          \ token, kb, default_text]):\n        return _make_resp(\"error\", \"host/token/kb/default_text均为必填\"\
          )\n\n    filename = f\"{filename}.md\" if filename else \"document.md\"\n\
          \    content = default_text.strip()\n    if not content:\n        return\
          \ _make_resp(\"empty\", \"default_text为空\", status=\"error\")\n\n    try:\n\
          \        doc_id = _upload(host, token, kb, content, filename)\n    except\
          \ Exception as e:\n        return _make_resp(\"error\", \"上传失败\", status=\"\
          error\", debug=str(e))\n\n    if not doc_id:\n        return _make_resp(\"\
          success\", \"文档已存在，跳过上传与向量化\", doc_id=\"\", status=\"skipped\", data=None)\n\
          \n    try:\n        vec_json = _vectorize(host, token, kb, [doc_id])\n \
          \       if vec_json.get(\"status\") != \"success\":\n            return\
          \ _make_resp(\"error\", \"向量化失败\", doc_id=doc_id, status=\"error\", data=vec_json)\n\
          \        return _make_resp(\"success\", vec_json.get(\"message\", \"vectorize\
          \ triggered\"), doc_id=doc_id, status=\"success\", data=vec_json)\n    except\
          \ Exception as e:\n        return _make_resp(\"error\", \"向量化异常\", doc_id=doc_id,\
          \ status=\"error\", debug=str(e))\n\n\n# # 示例测试\n# if __name__ == \"__main__\"\
          :\n#     params = {\n#         \"default_text\": \"test>= DATE_SUB(CURDATE(),\
          \ INTERVAL 30 DAY) AND cve_id IS NOT NULL ORDER BY published_time DESC LIMIT\
          \ 20;\",\n#         \"host\": \"https://rag.clouditera.com/\",\n#      \
          \   \"token\": \"88967296fcff4b19bd4d3d89ccf31e6a\",\n#         \"kb\":\
          \ \"cbb1b218b3e94e16b161877ed9e819a4\",\n#         \"filename\": \"test\"\
          \n#     }\n#     result = main(**params)\n#     print(\"测试结果：\")\n#    \
          \ print(result)\n\n\n\n"
        code_language: python3
