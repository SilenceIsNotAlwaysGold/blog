    - data:
        code: "from typing import Dict, List\n\ndef main(\n    user_question: str,\n\
          \    knowledge_context: str,\n    state: str,\n    knowledge_history_context:\
          \ List[str] | None,\n    search_query: str,\n    example_fields\n) -> Dict[str,\
          \ str]:\n    \"\"\"\n    生成结构可用性判断 + 候选值提示 Prompt，保证所有参数安全可用，输出更精炼。\n  \
          \  \"\"\"\n    # ---- 安全 strip 工具 ----\n    def safe_strip(x):\n       \
          \ return x.strip() if isinstance(x, str) else \"\"\n\n    user_question\
          \ = safe_strip(user_question)\n    knowledge_context = safe_strip(knowledge_context)\n\
          \    search_query = safe_strip(search_query)\n    example_fields = safe_strip(example_fields)\
          \ if isinstance(example_fields, str) else \"\"\n\n    knowledge_history_context\
          \ = knowledge_history_context or []\n    pl: list[str] = []\n\n    # 角色说明\n\
          \    pl += [\n        \"你是一名数据库结构与候选值分析专家，目标：判断结构能否直接支撑用户问题，若不能给补检建议。\"\n\
          \    ]\n\n    # 用户问题 & 关键词\n    pl += [\n        \"\\n【用户原始问题】\",\n    \
          \    \"```text\",\n        user_question,\n        \"```\",\n        \"\\\
          n【关键词/实体提示】\",\n        \"```text\",\n        search_query,\n        \"\
          ```\",\n    ]\n\n    # 当前结构信息\n    pl.append(\"\\n【当前结构信息】\")\n    if knowledge_context:\n\
          \        pl += [f\"当前检索 query: {search_query}\", \"```text\", knowledge_context,\
          \ \"```\"]\n    else:\n        pl.append(\"结构信息为空，请结合问题语义合理推断。\")\n\n  \
          \  # 历史结构信息（结构补全场景）\n    if state == \"fix_knowledge\" and knowledge_history_context:\n\
          \        pl += [\"\\n【历史结构信息】\", \"```text\"]\n        pl += [safe_strip(ctx)\
          \ for ctx in knowledge_history_context if isinstance(ctx, str)]\n      \
          \  pl.append(\"```\")\n\n    # fix_fields 场景下，输出上次无效字段\n    if state ==\
          \ \"fix_fields\" and example_fields:\n        pl += [\n            \"\\\
          n上次检索候选值为空，请重新给出（不得重复上次答案）：\",\n            example_fields,\n          \
          \  \"\"\n        ]\n\n    # 任务与规则\n    pl += [\n        \"\\n【任务目标与判断标准】\"\
          ,\n        \"- 判断结构能否支持用户问题，能则输出关键字段和 ≤3 个候选值，并说明 reason；\",\n        \"\
          - 若不能，指出缺失项并给下一步补检 query。\",\n        \"- 输出格式和字段命名必须严格一致，不能省略任何字段。\",\n\
          \        \"\\n【输出格式】\",\n        \"```json\",\n        \"{\",\n        '\
          \  \"can_answer\": \"true\" | \"false\",',\n        '  \"reason\": \"结构如何支持或缺失项\"\
          ,',\n        '  \"search_query\": \"false 时给补检关键词，true 留空\",',\n       \
          \ '  \"table_field_path\": \"true 时列出关键表.字段（逗号分隔），false 留空\",',\n      \
          \  '  \"candidate_values\": {',\n        '    \"表.字段\": [\"值1\", \"值2\"\
          , \"值3\"],',\n        '    \"...\": []',\n        '  }',\n        \"}\"\
          ,\n        \"```\"\n    ]\n\n    pl += [\n        \"\\n【注意事项】\",\n     \
          \   \"- candidate_values 只在 can_answer 为 true 时输出，false 时请为空对象 {}；\",\n\
          \        \"- true 时 reason 必须说明是哪些字段和结构支持查询，不能泛泛而谈；\",\n        \"- 避免模糊表达，如“可能”“大致”“应该”等。\"\
          \n    ]\n\n    return {\"prompt\": \"\\n\".join(pl)} "
        code_language: python3
