version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personal-blog-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://blogadmin:Xlj%40Blog2026!Secure@blog-mongodb:27017/?authSource=admin
      MONGODB_DB_NAME: personal_blog
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-xLj$9kR!mZ2vQ8pW#4nF7bY0hT6cA3eU}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: "https://autofish.club,https://www.autofish.club,http://localhost"
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Nginx + Vue SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personal-blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
