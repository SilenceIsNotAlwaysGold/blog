version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personal-blog-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://182.92.70.220:27017
      MONGODB_DB_NAME: personal_blog
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-xlj-blog-secret-key-2025}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: "http://localhost,http://182.92.70.220,http://0.0.0.0"
    ports:
      - "8001:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Nginx + Vue SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personal-blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
